name: Generate Blog Post

on:
  schedule:
    - cron: '0 9 * * 2'  # Tuesday 9am UTC
    - cron: '0 9 * * 5'  # Friday 9am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_FEED_API_KEY: ${{ secrets.BLOG_FEED_API_KEY }}
        run: python scripts/generate_post.py

      - name: Notify IndexNow
        if: success()
        run: |
          NEW_FILE=$(git diff --name-only HEAD~1 HEAD -- 'src/content/' | head -1)
          if [ -n "$NEW_FILE" ]; then
            SLUG=$(basename "$NEW_FILE" .md)
            curl -s "https://api.indexnow.org/indexnow?url=https://haremlitguide.com/blog/${SLUG}/&key=hlg5d2e8f1a3b7c9" || true
          fi
